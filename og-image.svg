<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2147"/>
      <stop offset="100%" stop-color="#081530"/>
    </linearGradient>
    <pattern id="stars" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(255,255,255,0.08)"/>
      <circle cx="60" cy="40" r="0.6" fill="rgba(255,255,255,0.06)"/>
      <circle cx="35" cy="65" r="0.7" fill="rgba(255,255,255,0.07)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#stars)"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="400" height="8" fill="#DC2626"/>
  <rect x="400" y="0" width="400" height="8" fill="#fff"/>
  <rect x="800" y="0" width="400" height="8" fill="#F59E0B"/>

  <!-- US flag (small, top-left) -->
  <g transform="translate(80,80)">
    <rect width="140" height="74" rx="3" fill="#B22234"/>
    <g fill="#fff">
      <rect y="5.7" width="140" height="5.7"/>
      <rect y="17.1" width="140" height="5.7"/>
      <rect y="28.5" width="140" height="5.7"/>
      <rect y="39.9" width="140" height="5.7"/>
      <rect y="51.3" width="140" height="5.7"/>
      <rect y="62.7" width="140" height="5.7"/>
    </g>
    <rect width="56" height="39.9" fill="#3C3B6E"/>
  </g>

  <!-- Brand title -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="80" y="280" font-size="140" font-weight="900" letter-spacing="-4" fill="#fff">State<tspan fill="#DC2626">doku</tspan></text>
    <rect x="500" y="294" width="120" height="6" fill="#F59E0B"/>
    <text x="80" y="345" font-size="34" font-weight="600" fill="rgba(255,255,255,0.85)">Daily US States Puzzle</text>
    <text x="80" y="385" font-size="22" font-weight="500" fill="rgba(255,255,255,0.6)">Like Sudoku, with American geography</text>
  </g>

  <!-- Mini puzzle grid mockup (right side) -->
  <g transform="translate(750,180)">
    <rect width="370" height="370" rx="16" fill="#fff" opacity="0.05" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- 4x4 grid (1 header row/col + 3 cells) -->
    <g font-family="Inter, system-ui, sans-serif">
      <!-- Header row labels -->
      <rect x="100" y="20" width="80" height="60" fill="rgba(255,255,255,0.08)"/>
      <rect x="190" y="20" width="80" height="60" fill="rgba(255,255,255,0.08)"/>
      <rect x="280" y="20" width="80" height="60" fill="rgba(255,255,255,0.08)"/>
      <text x="140" y="55" font-size="11" font-weight="800" text-anchor="middle" fill="#fff" letter-spacing="1">BORDERS</text>
      <text x="140" y="70" font-size="11" font-weight="800" text-anchor="middle" fill="#fff" letter-spacing="1">CANADA</text>
      <text x="230" y="55" font-size="11" font-weight="800" text-anchor="middle" fill="#fff" letter-spacing="1">PACIFIC</text>
      <text x="230" y="70" font-size="11" font-weight="800" text-anchor="middle" fill="#fff" letter-spacing="1">COAST</text>
      <text x="320" y="55" font-size="11" font-weight="800" text-anchor="middle" fill="#fff" letter-spacing="1">"NEW"</text>
      <text x="320" y="70" font-size="11" font-weight="800" text-anchor="middle" fill="#fff" letter-spacing="1">IN NAME</text>

      <!-- Column 1 (row labels) -->
      <rect x="20" y="90" width="70" height="80" fill="rgba(255,255,255,0.08)"/>
      <rect x="20" y="180" width="70" height="80" fill="rgba(255,255,255,0.08)"/>
      <rect x="20" y="270" width="70" height="80" fill="rgba(255,255,255,0.08)"/>
      <text x="55" y="130" font-size="11" font-weight="800" text-anchor="middle" fill="#fff" letter-spacing="1">WEST</text>
      <text x="55" y="220" font-size="11" font-weight="800" text-anchor="middle" fill="#fff" letter-spacing="1">SOUTH</text>
      <text x="55" y="310" font-size="11" font-weight="800" text-anchor="middle" fill="#fff" letter-spacing="1">NORTH-</text>
      <text x="55" y="325" font-size="11" font-weight="800" text-anchor="middle" fill="#fff" letter-spacing="1">EAST</text>

      <!-- Filled cells (correct = green) -->
      <rect x="100" y="90" width="80" height="80" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
      <text x="140" y="135" font-size="22" font-weight="800" text-anchor="middle" fill="#059669">WA</text>
      <text x="140" y="155" font-size="9" font-weight="700" text-anchor="middle" fill="#059669" letter-spacing="0.5">WASHINGTON</text>

      <rect x="190" y="90" width="80" height="80" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>
      <text x="230" y="138" font-size="28" font-weight="300" text-anchor="middle" fill="#D4D4D4">★</text>

      <rect x="280" y="90" width="80" height="80" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>
      <text x="320" y="138" font-size="28" font-weight="300" text-anchor="middle" fill="#D4D4D4">★</text>

      <rect x="100" y="180" width="80" height="80" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>
      <text x="140" y="228" font-size="28" font-weight="300" text-anchor="middle" fill="#D4D4D4">★</text>

      <rect x="190" y="180" width="80" height="80" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>
      <text x="230" y="228" font-size="28" font-weight="300" text-anchor="middle" fill="#D4D4D4">★</text>

      <rect x="280" y="180" width="80" height="80" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
      <text x="320" y="225" font-size="22" font-weight="800" text-anchor="middle" fill="#059669">FL</text>
      <text x="320" y="245" font-size="9" font-weight="700" text-anchor="middle" fill="#059669" letter-spacing="0.5">FLORIDA</text>

      <rect x="100" y="270" width="80" height="80" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>
      <text x="140" y="318" font-size="28" font-weight="300" text-anchor="middle" fill="#D4D4D4">★</text>

      <rect x="190" y="270" width="80" height="80" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>
      <text x="230" y="318" font-size="28" font-weight="300" text-anchor="middle" fill="#D4D4D4">★</text>

      <rect x="280" y="270" width="80" height="80" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
      <text x="320" y="315" font-size="18" font-weight="800" text-anchor="middle" fill="#059669">NY</text>
      <text x="320" y="335" font-size="9" font-weight="700" text-anchor="middle" fill="#059669" letter-spacing="0.5">NEW YORK</text>
    </g>
  </g>

  <!-- Bottom tagline -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="80" y="555" font-size="18" font-weight="700" fill="#F59E0B" letter-spacing="3">NEW PUZZLE EVERY DAY  ·  FREE  ·  NO SIGNUP</text>
    <text x="80" y="595" font-size="14" font-weight="500" fill="rgba(255,255,255,0.45)">statedoku.com</text>
  </g>

  <!-- Bottom tricolor stripe -->
  <rect x="0" y="622" width="400" height="8" fill="#0F2147"/>
  <rect x="400" y="622" width="400" height="8" fill="#fff"/>
  <rect x="800" y="622" width="400" height="8" fill="#DC2626"/>
</svg>
