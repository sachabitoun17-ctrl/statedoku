<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0F2147"/>

  <!-- Inner grid (white) -->
  <rect x="8" y="8" width="48" height="48" rx="6" fill="#fff" stroke="#0F2147" stroke-width="2"/>

  <!-- Grid lines -->
  <line x1="24" y1="10" x2="24" y2="54" stroke="#0F2147" stroke-width="2"/>
  <line x1="40" y1="10" x2="40" y2="54" stroke="#0F2147" stroke-width="2"/>
  <line x1="10" y1="24" x2="54" y2="24" stroke="#0F2147" stroke-width="2"/>
  <line x1="10" y1="40" x2="54" y2="40" stroke="#0F2147" stroke-width="2"/>

  <!-- Top-left cell: US flag -->
  <clipPath id="fc">
    <rect x="9.5" y="9.5" width="13.5" height="13.5" rx="4"/>
  </clipPath>
  <g clip-path="url(#fc)">
    <rect x="9.5" y="9.5" width="13.5" height="13.5" fill="#B22234"/>
    <rect x="9.5" y="11.4" width="13.5" height="1.1" fill="#fff"/>
    <rect x="9.5" y="13.5" width="13.5" height="1.1" fill="#fff"/>
    <rect x="9.5" y="15.6" width="13.5" height="1.1" fill="#fff"/>
    <rect x="9.5" y="17.7" width="13.5" height="1.1" fill="#fff"/>
    <rect x="9.5" y="19.8" width="13.5" height="1.1" fill="#fff"/>
    <rect x="9.5" y="21.9" width="13.5" height="1.1" fill="#fff"/>
    <rect x="9.5" y="9.5" width="5.8" height="6.5" fill="#3C3B6E"/>
  </g>

  <!-- Center: gold star -->
  <polygon points="32,27 34,31.5 38.9,32.1 35.2,35.4 36.2,40.3 32,37.8 27.8,40.3 28.8,35.4 25.1,32.1 30,31.5"
           fill="#F59E0B"/>

  <!-- Bottom-right: red dot -->
  <circle cx="47" cy="47" r="4" fill="#DC2626"/>
</svg>
