<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-label="Statedoku">
  <!-- Navy rounded background -->
  <rect width="64" height="64" rx="14" fill="#0F2147"/>

  <defs>
    <!-- Clip the entire SVG content to the shape of the letter S -->
    <clipPath id="s-clip">
      <text x="32" y="51" font-family="Helvetica, Arial, 'Inter', sans-serif" font-size="62" font-weight="900" text-anchor="middle">S</text>
    </clipPath>
    <linearGradient id="redG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
  </defs>

  <!-- Inside the S: full US flag pattern -->
  <g clip-path="url(#s-clip)">
    <!-- Red field -->
    <rect width="64" height="64" fill="url(#redG)"/>
    <!-- White stripes -->
    <g fill="#FFFFFF">
      <rect y="11" width="64" height="6"/>
      <rect y="23" width="64" height="6"/>
      <rect y="35" width="64" height="6"/>
      <rect y="47" width="64" height="6"/>
    </g>
    <!-- Blue canton with stars -->
    <rect width="28" height="22" fill="#1E3A8A"/>
    <g fill="#FFFFFF">
      <circle cx="5" cy="5" r="1.4"/>
      <circle cx="13" cy="5" r="1.4"/>
      <circle cx="21" cy="5" r="1.4"/>
      <circle cx="9" cy="11" r="1.4"/>
      <circle cx="17" cy="11" r="1.4"/>
      <circle cx="5" cy="17" r="1.4"/>
      <circle cx="13" cy="17" r="1.4"/>
      <circle cx="21" cy="17" r="1.4"/>
    </g>
  </g>
</svg>
