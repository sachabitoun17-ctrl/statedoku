<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" width="30" height="30" aria-label="Statedoku logo">
  <!-- Outer rounded grid container -->
  <rect width="30" height="30" rx="3.5" fill="#fff" stroke="#0F2147" stroke-width="1.6"/>

  <!-- Grid lines (vertical) -->
  <line x1="10" y1="2" x2="10" y2="28" stroke="#0F2147" stroke-width="1"/>
  <line x1="20" y1="2" x2="20" y2="28" stroke="#0F2147" stroke-width="1"/>

  <!-- Grid lines (horizontal) -->
  <line x1="2" y1="10" x2="28" y2="10" stroke="#0F2147" stroke-width="1"/>
  <line x1="2" y1="20" x2="28" y2="20" stroke="#0F2147" stroke-width="1"/>

  <!-- Top-left cell: mini US flag -->
  <g>
    <clipPath id="flagClip">
      <rect x="1.5" y="1.5" width="8" height="8" rx="2"/>
    </clipPath>
    <g clip-path="url(#flagClip)">
      <rect x="1.5" y="1.5" width="8" height="8" fill="#B22234"/>
      <rect x="1.5" y="2.6" width="8" height="0.65" fill="#fff"/>
      <rect x="1.5" y="3.85" width="8" height="0.65" fill="#fff"/>
      <rect x="1.5" y="5.1" width="8" height="0.65" fill="#fff"/>
      <rect x="1.5" y="6.35" width="8" height="0.65" fill="#fff"/>
      <rect x="1.5" y="7.6" width="8" height="0.65" fill="#fff"/>
      <rect x="1.5" y="8.85" width="8" height="0.65" fill="#fff"/>
      <rect x="1.5" y="1.5" width="3.4" height="3.6" fill="#3C3B6E"/>
    </g>
  </g>

  <!-- Center cell: gold star (the "fill me in" cue) -->
  <polygon points="15,12.8 16.05,15.05 18.4,15.35 16.7,17 17.1,19.3 15,18.2 12.9,19.3 13.3,17 11.6,15.35 13.95,15.05"
           fill="#F59E0B"/>

  <!-- Bottom-right cell: a subtle red dot (state placed) -->
  <circle cx="25" cy="25" r="2" fill="#DC2626"/>
</svg>
