<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-label="Statedoku logo">
  <!-- Soft rounded background with subtle gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F8FF"/>
    </linearGradient>
    <linearGradient id="flagBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="starGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Outer rounded container (no harsh stroke) -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" stroke="#0F2147" stroke-width="2.5"/>

  <!-- Smooth grid lines (thinner, more elegant) -->
  <g stroke="#0F2147" stroke-width="1.5" stroke-linecap="round" opacity="0.75">
    <line x1="24" y1="11" x2="24" y2="53"/>
    <line x1="40" y1="11" x2="40" y2="53"/>
    <line x1="11" y1="24" x2="53" y2="24"/>
    <line x1="11" y1="40" x2="53" y2="40"/>
  </g>

  <!-- Top-left cell: mini US flag with rounded corners (cozier) -->
  <clipPath id="flagClip">
    <rect x="9" y="9" width="14" height="14" rx="3.5"/>
  </clipPath>
  <g clip-path="url(#flagClip)">
    <rect x="9" y="9" width="14" height="14" fill="url(#flagBg)"/>
    <g fill="#FFFFFF">
      <rect x="9" y="11" width="14" height="1.1"/>
      <rect x="9" y="13.2" width="14" height="1.1"/>
      <rect x="9" y="15.4" width="14" height="1.1"/>
      <rect x="9" y="17.6" width="14" height="1.1"/>
      <rect x="9" y="19.8" width="14" height="1.1"/>
      <rect x="9" y="22.0" width="14" height="1.1"/>
    </g>
    <rect x="9" y="9" width="6" height="6.5" fill="#1E3A8A"/>
    <!-- Tiny stars on canton -->
    <g fill="#FFFFFF">
      <circle cx="10.6" cy="10.8" r="0.45"/>
      <circle cx="13" cy="10.8" r="0.45"/>
      <circle cx="11.8" cy="12.5" r="0.45"/>
      <circle cx="10.6" cy="14.2" r="0.45"/>
      <circle cx="13" cy="14.2" r="0.45"/>
    </g>
  </g>

  <!-- Center cell: friendly bouncy gold star -->
  <g transform="translate(32 32)">
    <circle r="6.5" fill="rgba(245,158,11,0.12)"/>
    <polygon points="0,-5.5 1.55,-1.75 5.5,-1.4 2.55,1.05 3.35,4.95 0,2.95 -3.35,4.95 -2.55,1.05 -5.5,-1.4 -1.55,-1.75"
             fill="url(#starGold)"
             stroke="#D97706" stroke-width="0.4" stroke-linejoin="round"/>
  </g>

  <!-- Bottom-right cell: cozy red heart-dot -->
  <g transform="translate(48 48)">
    <circle r="3.5" fill="#FEE2E2"/>
    <circle r="2.2" fill="#DC2626"/>
  </g>

  <!-- Top-right cell: subtle blue dot (filled cell) -->
  <g transform="translate(48 16)">
    <circle r="2.5" fill="rgba(15,33,71,0.12)"/>
  </g>

  <!-- Bottom-left cell: subtle blue dot -->
  <g transform="translate(16 48)">
    <circle r="2.5" fill="rgba(15,33,71,0.12)"/>
  </g>
</svg>
